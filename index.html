<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchStore</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <div class="logo">
        ⌚ WatchStore
    </div>

    <div class="search-container">
        <input
            type="text"
            id="searchBar"
            placeholder="Search by brand or model...">

        <button id="searchButton">
            Search
        </button>
    </div>

    <nav class="navLinks">
        <button class="navBtn" onclick="window.location.href='wishlist.html'">
            ♡ Wishlist
        </button>
    </nav>

</header>

<section class="hero">

    <img src="images/hero1.jpg" alt="Featured watches banner 1">

    <img src="images/hero2.jpg" alt="Featured watches banner 2">

    <img src="images/hero3.jpg" alt="Featured watches banner 3">

</section>

<section class="offers">

<h2>Today's Deals</h2>

<div class="offerContainer">

<div class="offer">
20% OFF Luxury Watches
</div>

<div class="offer">
Buy One Strap, Get One Free
</div>

<div class="offer">
Free Shipping Above ₹5000
</div>

</div>

</section>

<section class="productsSection">

<h2>Popular Watches</h2>

<div id="productContainer"
class="products">

</div>

</section>

<footer>

<h3>WatchStore</h3>

<p>📍 123 Luxury Avenue, Bangalore, India</p>

<p>📞 +91 98765 43210</p>

<p>✉ support@watchstore.com</p>

<p>Mon - Sat | 9:00 AM - 8:00 PM</p>

</footer>

<script src="js/products.js"></script>

<script src="js/script.js"></script>

</body>
</html>
